<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 eReader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14140f;
    --bg-raised: #1c1c16;
    --bg-hover: #24241c;
    --ink: #e8e4d8;
    --ink-dim: #948e7c;
    --ink-faint: #5c5748;
    --ember: #c98a4b;
    --ember-dim: #7a5730;
    --line: #2c2b23;
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    height:100%;
    overflow:hidden;
  }
  #app{ height:100vh; display:flex; flex-direction:column; }

  /* ---------- Top bar ---------- */
  #topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--line);
    flex-shrink:0;
  }
  #brand{ display:flex; align-items:center; gap:10px; }
  #brand .mark{
    width:20px; height:20px; position:relative; flex-shrink:0;
  }
  #brand .mark svg{ width:100%; height:100%; display:block; }
  #brand span{ font-family: var(--serif); font-size:19px; letter-spacing:0.02em; font-style:italic; }
  #topbar .actions{ display:flex; align-items:center; gap:10px; }
  button{
    font-family: var(--sans); font-size:13px; color:var(--ink);
    background:transparent; border:1px solid var(--line);
    padding:8px 14px; border-radius:3px; cursor:pointer;
    letter-spacing:0.02em; transition: border-color .15s, background .15s;
  }
  button:hover{ border-color:var(--ink-faint); background:var(--bg-hover); }
  button.primary{ border-color:var(--ember-dim); color:var(--ember); }
  button.primary:hover{ background: rgba(201,138,75,0.08); border-color:var(--ember); }
  button.icon{ padding:8px 10px; }
  input[type=file]{ display:none; }

  /* ---------- Library ---------- */
  #library{ flex:1; overflow-y:auto; padding: 36px 28px 60px; }
  #library-inner{ max-width: 980px; margin:0 auto; }
  #lib-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:28px; }
  #lib-head h1{ font-family:var(--sans); font-weight:500; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-dim); }
  #lib-count{ font-size:12px; color:var(--ink-faint); }

  #dropzone{
    border: 1px dashed var(--line);
    border-radius: 4px;
    padding: 48px 24px;
    text-align:center;
    color: var(--ink-faint);
    font-size:13px;
    margin-bottom: 36px;
    transition: border-color .15s, color .15s;
    cursor:pointer;
  }
  #dropzone.drag{ border-color: var(--ember); color: var(--ember); }
  #dropzone .dz-title{ font-family:var(--serif); font-style:italic; font-size:17px; color:var(--ink-dim); margin-bottom:6px; }
  #dropzone.drag .dz-title{ color: var(--ember); }

  #grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
    gap: 28px 22px;
  }
  .book-card{ cursor:pointer; }
  .cover{
    width:100%; aspect-ratio: 2/3;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 2px;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    position:relative;
    transition: border-color .15s, transform .15s;
  }
  .book-card:hover .cover{ border-color: var(--ink-faint); transform: translateY(-2px); }
  .cover img{ width:100%; height:100%; object-fit:cover; display:block; }
  .cover .fallback{
    font-family: var(--serif); font-style:italic; font-size:13px;
    color: var(--ink-dim); text-align:center; padding:14px; line-height:1.4;
  }
  .progress-pip{
    position:absolute; bottom:0; left:0; right:0; height:2px; background: rgba(255,255,255,0.06);
  }
  .progress-pip i{ display:block; height:100%; background: var(--ember); }
  .book-title{ font-family: var(--serif); font-size:14px; margin-top:10px; line-height:1.3; color: var(--ink); }
  .book-author{ font-size:11px; color: var(--ink-faint); margin-top:2px; }

  #empty-state{ text-align:center; padding: 60px 20px; color: var(--ink-faint); }
  #empty-state .es-title{ font-family:var(--serif); font-style:italic; font-size:20px; color:var(--ink-dim); margin-bottom:8px; }
  #empty-state p{ font-size:13px; max-width:360px; margin:0 auto; line-height:1.6; }

  /* ---------- Reader ---------- */
  #reader{ flex:1; display:none; flex-direction:column; overflow:hidden; }
  #reader.active{ display:flex; }
  #reader-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 24px; border-bottom:1px solid var(--line); flex-shrink:0;
  }
  #reader-bar .left{ display:flex; align-items:center; gap:14px; min-width:0; }
  #reader-title{ font-family:var(--serif); font-style:italic; font-size:14px; color:var(--ink-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 320px; }
  #reader-bar .right{ display:flex; align-items:center; gap:8px; }

  #font-controls{ display:flex; align-items:center; gap:2px; border:1px solid var(--line); border-radius:3px; }
  #font-controls button{ border:none; padding:7px 10px; }
  #font-controls span{ font-size:11px; padding:0 6px; color:var(--ink-faint); }

  #page-wrap{ flex:1; overflow-y:auto; }
  #page{
    max-width: 640px; margin: 0 auto; padding: 64px 32px 120px;
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.85;
    color: var(--ink);
  }
  #page h1, #page h2, #page h3{ font-style:italic; font-weight:600; line-height:1.3; margin: 1.4em 0 0.6em; color:#f1eee2; }
  #page p{ margin: 0 0 1.1em; }
  #page img{ max-width:100%; height:auto; display:block; margin: 1.5em auto; border-radius:2px; }
  #page a{ color: var(--ember); }
  #page::selection, #page *::selection{ background: rgba(201,138,75,0.28); }

  #reader-footer{
    flex-shrink:0; padding: 12px 24px; border-top:1px solid var(--line);
    display:flex; align-items:center; gap:16px;
  }
  #chapter-progress{ flex:1; height:2px; background: var(--line); position:relative; cursor:pointer; border-radius:2px; }
  #chapter-progress i{ position:absolute; left:0; top:0; bottom:0; background: var(--ember); border-radius:2px; }
  #footer-label{ font-size:11px; color: var(--ink-faint); white-space:nowrap; min-width:80px; text-align:right; }

  #loading-msg{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background: var(--bg-raised); border:1px solid var(--line); padding:9px 16px;
    border-radius:3px; font-size:12px; color:var(--ink-dim); display:none; z-index:50; }
  #loading-msg.show{ display:block; }

  ::-webkit-scrollbar{ width:9px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background: var(--line); border-radius:5px; }
  ::-webkit-scrollbar-thumb:hover{ background: var(--ink-faint); }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div id="brand">
      <div class="mark">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M2 3.5C2 3.5 5 2 10 3.5V17C5 15.5 2 17 2 17V3.5Z" stroke="#c98a4b" stroke-width="1.1" stroke-linejoin="round"/>
          <path d="M18 3.5C18 3.5 15 2 10 3.5V17C15 15.5 18 17 18 17V3.5Z" stroke="#c98a4b" stroke-width="1.1" stroke-linejoin="round"/>
        </svg>
      </div>
      <span>📖 eReader</span>
    </div>
    <div class="actions">
      <button class="icon" id="back-btn" style="display:none;" title="Back to library">&larr; Library</button>
      <button class="primary" id="add-btn">Add books</button>
      <input type="file" id="file-input" accept=".epub" multiple>
    </div>
  </div>

  <div id="library">
    <div id="library-inner">
      <div id="lib-head">
        <h1>Your library</h1>
        <span id="lib-count"></span>
      </div>
      <div id="dropzone">
        <div class="dz-title">Drop .epub files here</div>
        <div>or click to browse your Files folder</div>
      </div>
      <div id="grid"></div>
      <div id="empty-state" style="display:none;">
        <div class="es-title">Nothing on the shelf yet</div>
        <p>Add .epub files from your computer to start reading. Nothing is uploaded anywhere — books are parsed and kept right here in this session.</p>
      </div>
    </div>
  </div>

  <div id="reader">
    <div id="reader-bar">
      <div class="left">
        <button class="icon" id="reader-back" title="Back to library">&larr;</button>
        <span id="reader-title"></span>
      </div>
      <div class="right">
        <div id="font-controls">
          <button id="font-dec" title="Smaller text">A&minus;</button>
          <span id="font-size-label">18</span>
          <button id="font-inc" title="Larger text">A+</button>
        </div>
      </div>
    </div>
    <div id="page-wrap"><div id="page"></div></div>
    <div id="reader-footer">
      <button class="icon" id="prev-chapter" title="Previous chapter">&larr;</button>
      <div id="chapter-progress"><i id="chapter-progress-fill"></i></div>
      <button class="icon" id="next-chapter" title="Next chapter">&rarr;</button>
      <span id="footer-label"></span>
    </div>
  </div>

</div>
<div id="loading-msg"></div>

<script>
const library = [];
let currentBook = null;
let currentChapterIndex = 0;
let fontSize = 18;

const el = id => document.getElementById(id);
const grid = el('grid');
const dropzone = el('dropzone');
const fileInput = el('file-input');
const libraryView = el('library');
const readerView = el('reader');
const loadingMsg = el('loading-msg');

function showLoading(text){ loadingMsg.textContent = text; loadingMsg.classList.add('show'); }
function hideLoading(){ loadingMsg.classList.remove('show'); }

function resolvePath(base, rel){
  if(rel.startsWith('/')) return rel.slice(1);
  const baseParts = base.split('/').slice(0, -1);
  const relParts = rel.split('/');
  for(const part of relParts){
    if(part === '.' || part === '') continue;
    if(part === '..') baseParts.pop();
    else baseParts.push(part);
  }
  return baseParts.join('/');
}

async function parseEpub(file, fallbackName){
  const zip = await JSZip.loadAsync(file);
  const containerXml = await zip.file('META-INF/container.xml').async('text');
  const containerDoc = new DOMParser().parseFromString(containerXml, 'application/xml');
  const opfPath = containerDoc.querySelector('rootfile').getAttribute('full-path');
  const opfText = await zip.file(opfPath).async('text');
  const opfDoc = new DOMParser().parseFromString(opfText, 'application/xml');

  const nameForFallback = (file && file.name) ? file.name : (fallbackName || 'Untitled');
  const title = opfDoc.querySelector('metadata title')?.textContent?.trim() || nameForFallback.replace(/\.epub$/i,'');
  const author = opfDoc.querySelector('metadata creator')?.textContent?.trim() || 'Unknown author';

  const manifestItems = {};
  opfDoc.querySelectorAll('manifest item').forEach(item=>{
    manifestItems[item.getAttribute('id')] = {
      href: item.getAttribute('href'),
      mediaType: item.getAttribute('media-type')
    };
  });

  const spineIds = Array.from(opfDoc.querySelectorAll('spine itemref')).map(i=>i.getAttribute('idref'));
  const chapters = spineIds
    .map(id=>manifestItems[id])
    .filter(item=>item && /html|xml/i.test(item.mediaType))
    .map(item=>resolvePath(opfPath, item.href));

  // cover image
  let coverUrl = null;
  const coverMeta = opfDoc.querySelector('metadata meta[name="cover"]');
  let coverId = coverMeta?.getAttribute('content');
  let coverItem = coverId ? manifestItems[coverId] : null;
  if(!coverItem){
    const coverManifest = Object.values(manifestItems).find(i => i.mediaType && i.mediaType.startsWith('image') && /cover/i.test(i.href));
    if(coverManifest) coverItem = coverManifest;
  }
  if(coverItem){
    const coverPath = resolvePath(opfPath, coverItem.href);
    const coverFile = zip.file(coverPath);
    if(coverFile){
      const blob = await coverFile.async('blob');
      coverUrl = URL.createObjectURL(blob);
    }
  }

  return { title, author, zip, opfPath, chapters, coverUrl, progress: 0, id: 'b'+Math.random().toString(36).slice(2) };
}

async function loadFiles(fileList){
  const files = Array.from(fileList).filter(f=>f.name.toLowerCase().endsWith('.epub'));
  if(files.length === 0) return;
  showLoading('Reading ' + (files.length>1 ? files.length+' books…' : files[0].name));
  for(const file of files){
    try{
      const book = await parseEpub(file);
      library.push(book);
    }catch(err){
      console.error('Failed to parse', file.name, err);
    }
  }
  hideLoading();
  renderLibrary();
}

async function loadFromBooksList(){
  let listText;
  try{
    const res = await fetch('Files/Books.txt');
    if(!res.ok) return; // no manifest present, skip silently
    listText = await res.text();
  }catch(err){
    return; // e.g. running from file:// or manifest missing
  }

  const entries = listText
    .split(/\r?\n/)
    .map(l=>l.trim())
    .filter(l=>l && !l.startsWith('#'));

  if(entries.length === 0) return;

  showLoading('Loading your library…');
  for(const entry of entries){
    const path = entry.startsWith('Files/') ? entry : `Files/${entry}`;
    try{
      const res = await fetch(path);
      if(!res.ok){ console.error('Could not fetch', path, res.status); continue; }
      const blob = await res.blob();
      const fallbackName = path.split('/').pop();
      const book = await parseEpub(blob, fallbackName);
      library.push(book);
    }catch(err){
      console.error('Failed to load', entry, err);
    }
  }
  hideLoading();
  renderLibrary();
}

function renderLibrary(){
  el('lib-count').textContent = library.length ? library.length + (library.length===1?' book':' books') : '';
  el('empty-state').style.display = library.length ? 'none' : 'block';
  grid.innerHTML = '';
  library.forEach(book=>{
    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <div class="cover">
        ${book.coverUrl ? `<img src="${book.coverUrl}" alt="">` : `<div class="fallback">${escapeHtml(book.title)}</div>`}
        ${book.progress > 0 ? `<div class="progress-pip"><i style="width:${Math.round(book.progress*100)}%"></i></div>` : ''}
      </div>
      <div class="book-title">${escapeHtml(book.title)}</div>
      <div class="book-author">${escapeHtml(book.author)}</div>
    `;
    card.addEventListener('click', ()=>openBook(book));
    grid.appendChild(card);
  });
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function openBook(book){
  currentBook = book;
  currentChapterIndex = book.lastChapter || 0;
  libraryView.style.display = 'none';
  readerView.classList.add('active');
  el('back-btn').style.display = 'inline-block';
  el('reader-title').textContent = book.title;
  await renderChapter();
}

async function renderChapter(){
  const book = currentBook;
  const path = book.chapters[currentChapterIndex];
  const pageEl = el('page');
  pageEl.style.fontSize = fontSize + 'px';
  if(!path){ pageEl.innerHTML = '<p>End of book.</p>'; return; }
  showLoading('Turning the page…');
  const chapFile = book.zip.file(path);
  if(!chapFile){ hideLoading(); pageEl.innerHTML = '<p>Could not load this chapter.</p>'; return; }
  const text = await chapFile.async('text');
  const doc = new DOMParser().parseFromString(text, 'application/xhtml+xml');
  const body = doc.querySelector('body');

  // resolve relative images to blob urls
  if(body){
    const imgs = body.querySelectorAll('img, image');
    for(const img of imgs){
      const attr = img.tagName.toLowerCase()==='image' ? 'xlink:href' : 'src';
      const src = img.getAttribute(attr) || img.getAttribute('href');
      if(!src) continue;
      const imgPath = resolvePath(path, src);
      const imgFile = book.zip.file(imgPath);
      if(imgFile){
        const blob = await imgFile.async('blob');
        const url = URL.createObjectURL(blob);
        if(img.tagName.toLowerCase()==='img') img.setAttribute('src', url);
        else img.setAttribute('href', url);
      }
    }
  }

  pageEl.innerHTML = body ? body.innerHTML : text;
  el('page-wrap').scrollTop = 0;
  hideLoading();

  book.lastChapter = currentChapterIndex;
  book.progress = (currentChapterIndex + 1) / book.chapters.length;
  const pct = Math.round(book.progress * 100);
  el('footer-label').textContent = `Chapter ${currentChapterIndex+1} of ${book.chapters.length}`;
  el('chapter-progress-fill').style.width = pct + '%';
}

function closeReader(){
  readerView.classList.remove('active');
  libraryView.style.display = 'block';
  el('back-btn').style.display = 'none';
  renderLibrary();
}

el('add-btn').addEventListener('click', ()=>fileInput.click());
dropzone.addEventListener('click', ()=>fileInput.click());
fileInput.addEventListener('change', e=>loadFiles(e.target.files));

['dragenter','dragover'].forEach(evt=>{
  dropzone.addEventListener(evt, e=>{ e.preventDefault(); dropzone.classList.add('drag'); });
});
['dragleave','drop'].forEach(evt=>{
  dropzone.addEventListener(evt, e=>{ e.preventDefault(); dropzone.classList.remove('drag'); });
});
dropzone.addEventListener('drop', e=>{
  if(e.dataTransfer.files) loadFiles(e.dataTransfer.files);
});

el('back-btn').addEventListener('click', closeReader);
el('reader-back').addEventListener('click', closeReader);

el('prev-chapter').addEventListener('click', ()=>{
  if(currentChapterIndex > 0){ currentChapterIndex--; renderChapter(); }
});
el('next-chapter').addEventListener('click', ()=>{
  if(currentChapterIndex < currentBook.chapters.length - 1){ currentChapterIndex++; renderChapter(); }
});
el('chapter-progress').addEventListener('click', e=>{
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const idx = Math.min(currentBook.chapters.length-1, Math.max(0, Math.floor(ratio * currentBook.chapters.length)));
  currentChapterIndex = idx;
  renderChapter();
});

el('font-inc').addEventListener('click', ()=>{
  fontSize = Math.min(28, fontSize+1);
  el('font-size-label').textContent = fontSize;
  el('page').style.fontSize = fontSize+'px';
});
el('font-dec').addEventListener('click', ()=>{
  fontSize = Math.max(13, fontSize-1);
  el('font-size-label').textContent = fontSize;
  el('page').style.fontSize = fontSize+'px';
});

document.addEventListener('keydown', e=>{
  if(!readerView.classList.contains('active')) return;
  if(e.key === 'ArrowRight') el('next-chapter').click();
  if(e.key === 'ArrowLeft') el('prev-chapter').click();
  if(e.key === 'Escape') closeReader();
});

renderLibrary();
loadFromBooksList();
</script>
</body>
</html>
